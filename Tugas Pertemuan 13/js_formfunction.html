<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>FORM FUNCTION</h1>
    <p>FORM FUNCTION</p>
    <form>
      <label for="nama">Nama:</label>
      <input type="text" id="nama" name="nama" />
      <br /><br />
      <label for="email" >Email:</label>
      <input type="email" id="email" name="email" />
      <br /><br />
      <button type="submit" onclick="validateForm()" value="Submit" >Submit</button>
    </form>
    <p id="result"></p>
    <script>
      function validateForm() {
        var nama = document.getElementById('nama').value;
        var email = document.getElementById('email').value;
        if (nama === "" || email === "") {
          document.getElementById('result').innerHTML = "Nama dan Email harus diisi!";
        } else {
          document.getElementById('result').innerHTML = "Form berhasil disubmit!";
        }
      }

      
    </script>
  </body>
</html>
